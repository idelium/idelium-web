name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.17.0
          cache: npm
      - run: npm ci
      - run: npm run audit:dependencies
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm run test:coverage
      - run: npm run build
